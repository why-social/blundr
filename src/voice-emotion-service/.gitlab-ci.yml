stages:
  - build
  - push
  - deploy

variables:
  IMAGE_NAME: "blundr/ve-infer"
  DOCKER_HOST: tcp://docker:2375
  DOCKER_TLS_CERTDIR: ""
  DOCKER_CLI_EXPERIMENTAL: enabled
  DOCKER_BUILDKIT: 1

services:
  - docker:20.10.24-dind

build:
  stage: build
  image: docker:20.10.24
  tags:
    - local
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event" || $CI_COMMIT_BRANCH == "main"
      changes:
        - src/voice-emotion-service/**/*
  before_script:
    - docker info
    - docker buildx create --name builder --use || docker buildx use builder
    - docker buildx inspect --bootstrap
  script:
    - cd src/voice-emotion-service
    - docker buildx build
      --platform linux/amd64
      -t $IMAGE_NAME:latest
      --load .
    - docker save $IMAGE_NAME:latest -o ve-infer.tar
  artifacts:
    paths:
      - src/voice-emotion-service/ve-infer.tar
    expire_in: 1 hour

