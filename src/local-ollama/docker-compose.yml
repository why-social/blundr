services:
  ollama:
    image: ollama/ollama:latest
    container_name: olalama
    restart: always
    privileged: true
    volumes:
      - ${HOME}/.ollama:/root/.ollama:z
    network_mode: host
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]

  tunnel:
    image: cloudflare/cloudflared:latest
    container_name: cloudflared-tunnel
    restart: always
    network_mode: host
    command: tunnel run
    env_file: .env
    depends_on:
      - ollama
